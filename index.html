<body>

  <!-- AI Andrew popup -->
  <div class="ai-andrew-backdrop" id="aiAndrewDialog" role="dialog" aria-modal="true" aria-hidden="true" aria-labelledby="aiAndrewTitle">
    <div class="ai-andrew-modal" role="document">
      <header class="ai-andrew-modal__header">
        <h2 id="aiAndrewTitle">Chat with AI Andrew</h2>
        <button type="button" class="ai-andrew-modal__close" id="aiAndrewClose" aria-label="Close">&times;</button>
      </header>
      <div class="ai-andrew-modal__body" id="aiAndrewBody">
        <!-- placeholder content; replace with chat embed or launch CTA -->
        <p>An AI version of Andrew, trained on his work, thinking and writing. Ask it anything you'd ask Andrew.</p>
        <p><em>Coming soon.</em></p>
      </div>
    </div>
  </div>

  <main id="app" aria-live="polite"></main>
  <span id="year" class="sr-only"></span>

  <!-- Safe loader: only used if script.js didn’t define loadSections -->
  <script>
    window.loadSections = window.loadSections || (function() {
      return function(files) {
        const app = document.getElementById('app');
        (async () => {
          for (const file of files) {
            try {
              const res = await fetch(file, { cache: 'no-store' });
              if (!res.ok) throw new Error(file + ' ' + res.status);
              const html = await res.text();
              const wrap = document.createElement('div');
              wrap.innerHTML = html;
              app.appendChild(wrap);
            } catch (e) {
              console.error('Section load failed:', e);
            }
          }
        })();
      }
    })();

    window.addEventListener('DOMContentLoaded', () => {
      loadSections([
        'hero.html',
        'work.html',
        'speaking.html',
        'about-experience.html',
        'thoughts.html',
        'portfolio.html',
        'footer-callout.html',
        'footer.html',
        'ticker.html'
      ]);
    });

    // ---- AI Andrew popup ----
    (function(){
      const openBtn = document.getElementById('aiAndrewOpen');
      const dialog  = document.getElementById('aiAndrewDialog');
      const closeBtn= document.getElementById('aiAndrewClose');
      if (!openBtn || !dialog || !closeBtn) return;
      let lastFocus = null;
      function open(){
        lastFocus = document.activeElement;
        dialog.setAttribute('aria-hidden','false');
        openBtn.setAttribute('aria-expanded','true');
        document.body.classList.add('no-scroll');
        closeBtn.focus();
        document.addEventListener('keydown', escClose);
      }
      function close(){
        dialog.setAttribute('aria-hidden','true');
        openBtn.setAttribute('aria-expanded','false');
        document.body.classList.remove('no-scroll');
        document.removeEventListener('keydown', escClose);
        if (lastFocus) lastFocus.focus();
      }
      function escClose(e){ if (e.key === 'Escape') close(); }
      openBtn.addEventListener('click', open);
      closeBtn.addEventListener('click', close);
      dialog.addEventListener('click', (e) => { if (e.target === dialog) close(); });
    })();
  </script>
</body>
</html>
